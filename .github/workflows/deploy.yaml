name: Deploy Application 🐋

on:
  push:
    tags:
      - "*.*.*"

jobs:
  ci:
    name: 🛠️ Build
    runs-on: ubuntu-latest

    steps:
      - name: 🔽 Checkout
        uses: actions/checkout@v4

      - name: Install SDKMAN!
        run: |
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk version

      - name: 🔧 Setup JDK 21
        run: |
          source "/home/runner/.sdkman/bin/sdkman-init.sh"
          sdk install java 23.1.6.r21-nik
          sdk use java 23.1.6.r21-nik

      - name: 🔧 Setup Maven 3.9.8
        run: |
          source "/home/runner/.sdkman/bin/sdkman-init.sh"
          sdk install maven 3.9.8
          sdk use maven 3.9.8

      - name: 🛠️ Build Application
        run: |
          source "/home/runner/.sdkman/bin/sdkman-init.sh"
          mvn clean package -Dquarkus.profile=prod -Pnative

      - name: 🛠️ Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/

  docker:
    name: 🐋 Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: 🔽 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: target/

      - name: 🛠️ Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/russian-cheatsheet-api:${{ github.ref_name }} -f ./src/main/docker/Dockerfile.native-micro .

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🛠️ Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/russian-cheatsheet-api:${{ github.ref_name }}

  deploy:
    name: 🚀 Deploy Application
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read

    steps:
      - name: 🔽 Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: echo "image=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Check out Helm charts repository
        uses: actions/checkout@v4
        with:
          repository: pausegarra/helm-charts
          path: helm-charts

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Create/Update DB secret in cluster
        env:
          HELM_NAMESPACE: ${{ vars.HELM_NAMESPACE }}
          DB_SECRET_NAME: ${{ vars.DB_SECRET_NAME }}
          DB_USER: ${{ secrets.DB_USER || secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_MEMRISE_ACCESS_TOKEN: ${{ secrets.APP_MEMRISE_ACCESS_TOKEN }}
        run: |
          namespace="${HELM_NAMESPACE:-main}"
          secret_name="russian-cheatsheet-api-secret"

          kubectl create namespace "$namespace" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic "$secret_name" \
            --namespace "$namespace" \
            --from-literal=QUARKUS_DATASOURCE_USERNAME="$DB_USER" \
            --from-literal=QUARKUS_DATASOURCE_PASSWORD="$DB_PASSWORD" \
            --from-literal=APP_MEMRISE_ACCESS_TOKEN="$APP_MEMRISE_ACCESS_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade
        env:
          REGISTRY: ghcr.io
          HELM_RELEASE: ${{ vars.HELM_RELEASE }}
          HELM_NAMESPACE: ${{ vars.HELM_NAMESPACE }}
          HELM_CHART_PATH: ${{ vars.HELM_CHART_PATH }}
          HELM_VALUES_FILE: ${{ vars.HELM_VALUES_FILE }}
          IMAGE_REPO: ${{ steps.prep.outputs.image }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          release="${HELM_RELEASE:-russian-cheatsheet-api}"
          namespace="${HELM_NAMESPACE:-main}"
          chart_path="${HELM_CHART_PATH:-helm-charts}"
          values_file="${HELM_VALUES_FILE:-k3s/values.yaml}"

          if [ ! -d "$chart_path" ]; then
            echo "Chart path does not exist: $chart_path"
            exit 1
          fi

          helm upgrade --install "$release" "$chart_path" \
            --namespace "$namespace" \
            --create-namespace \
            --values "$values_file" \
            --set image.tag="${IMAGE_TAG}"

  clean-up:
    name: 🧹 Clean up
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: 🗑️ Delete Artifact to save space
        uses: geekyeggo/delete-artifact@v5
        with:
          name: build-artifacts